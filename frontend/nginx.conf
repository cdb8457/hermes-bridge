server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Direct health check — backend exposes /health (no /api/ prefix)
    location = /health {
        proxy_pass http://192.168.1.31:8642/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Proxy REST API to Hermes backend
    # NOTE: no trailing slash on proxy_pass — preserves the full /api/... path
    location /api/ {
        proxy_pass http://192.168.1.31:8642;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        # Required for SSE (Server-Sent Events) — disable response buffering
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header X-Accel-Buffering no;
    }

    # Serve uploaded files
    location /uploads/ {
        proxy_pass http://192.168.1.31:8642/uploads/;
        proxy_http_version 1.1;
    }

    # SPA fallback — must be last
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
